spring:
  application:
    name: iwoa-backend
  config:
    import: optional:file:./config/application-local.yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:iwoa}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${MYSQL_USERNAME:iwoa_app}
    password: ${MYSQL_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/mysql/init.sql

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
